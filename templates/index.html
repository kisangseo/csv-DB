    <!-- Flatpickr JS -->

    <script id="fp-script-v2">
      // Helper function to update both visible + hidden fields
      function updateDateFields(selectedDates) {
        const f = d => d.toISOString().slice(0, 10);
        let val = "";

        if (selectedDates.length === 1) {
          const one = f(selectedDates[0]);
          val = `${one} to ${one}`;
        }
        else if (selectedDates.length === 2) {
            val = `${f(selectedDates[0])} to ${f(selectedDates[1])}`;
        }
        else {
            // No dates selected
            val = "";
        }

        // Hidden field -> backend uses this
        document.getElementById("intake_date_hidden").value = val;

        // Visible field -> user sees this
        document.getElementById("intake_date").value = val;
      }
    
    
    
      flatpickr("#intake_date", {
        mode: "range",

        // INTERNAL format (do NOT change)
        dateFormat: "Y-m-d",

        // USER-visible input
        altInput: true,
        altFormat: "m/d/Y",
        allowInput: true,

        onChange: function (selectedDates) {
          updateDateFields(selectedDates);
        },
        onClose: function (selectedDates) {
          updateDateFields(selectedDates);
        }
      });
      flatpickr("#dob", {
        dateFormat: "Y-m-d",   // internal (do NOT change)
        altInput: true,
        altFormat: "m/d/Y",    // what users see & type
        allowInput: true
      });

      
      
    </script>

        "field services department - warrants": "Field Services Department"
      };

      const ACTIONABLE_DEPARTMENTS = new Set(["active warrants", "bcso active warrants", "field services department"]);
      const LANDLORD_TENANT_DEPARTMENTS = new Set([
        "field services department",
        "field services department - civil intake",
        "field services department - civil survey",
        "field services department - warrants"
      ]);
      const ADD_ALLOWED_TABLES = new Set(["Warrants to Audit", "BCSO Active Warrants"]);
      const DATE_SORT_DIRECTIONS = { asc: "asc", desc: "desc" };

      function parseDateForSort(value) {
        if (!value) return Number.NaN;
        const parsed = Date.parse(value);
        if (!Number.isNaN(parsed)) return parsed;
        const mmddyyyy = /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/;
        const match = String(value).trim().match(mmddyyyy);
        if (!match) return Number.NaN;
        const [, m, d, y] = match;
        return Date.parse(`${y}-${m.padStart(2, "0")}-${d.padStart(2, "0")}`);
      }

      function sortTableByDate(table, columnIndex, direction) {
        const tbody = table.querySelector("tbody");
        if (!tbody) return;
        const rows = Array.from(tbody.querySelectorAll("tr"));
        const sign = direction === DATE_SORT_DIRECTIONS.asc ? 1 : -1;

        rows.sort((a, b) => {
          const aText = a.children[columnIndex]?.textContent?.trim() || "";
          const bText = b.children[columnIndex]?.textContent?.trim() || "";
          const aDate = parseDateForSort(aText);
          const bDate = parseDateForSort(bText);
          const aHasDate = !Number.isNaN(aDate);
          const bHasDate = !Number.isNaN(bDate);

          if (aHasDate && bHasDate && aDate !== bDate) return (aDate - bDate) * sign;
          if (aHasDate !== bHasDate) return (aHasDate ? -1 : 1);
          return aText.localeCompare(bText) * sign;
        });

        rows.forEach((row) => tbody.appendChild(row));
      }

      function wireDateHeaderSort(table, th, columnIndex) {
        const sortButton = document.createElement("button");
        sortButton.type = "button";
        sortButton.className = "date-sort-btn";
        sortButton.setAttribute("aria-label", "Sort by date");
        sortButton.dataset.direction = DATE_SORT_DIRECTIONS.asc;
        sortButton.textContent = "↕";

        sortButton.addEventListener("click", () => {
          const currentDirection = sortButton.dataset.direction || DATE_SORT_DIRECTIONS.asc;
          const nextDirection =
            currentDirection === DATE_SORT_DIRECTIONS.asc
              ? DATE_SORT_DIRECTIONS.desc
              : DATE_SORT_DIRECTIONS.asc;

          table.querySelectorAll(".date-sort-btn").forEach((btn) => {
            btn.textContent = "↕";
            btn.dataset.direction = DATE_SORT_DIRECTIONS.asc;
          });

          sortButton.dataset.direction = nextDirection;
          sortButton.textContent = nextDirection === DATE_SORT_DIRECTIONS.asc ? "↑" : "↓";
          sortTableByDate(table, columnIndex, nextDirection);
        });

        th.appendChild(sortButton);
      }

      let tableDefinitions = {};
      let activeEditContext = null;
      let lastSearchFilters = null;
      let exportPollTimer = null;

      function openModal({mode, tableName, values = {}, recordId = null}) {
        const modal = document.getElementById("recordModal");
        const title = document.getElementById("modalTitle");
        const tableSelect = document.getElementById("tableSelect");
        const status = document.getElementById("modalStatus");
        status.textContent = "";

        activeEditContext = {mode, recordId};
        title.textContent = mode === "edit" ? "Edit Record" : "Add Record";
        tableSelect.value = tableName || tableSelect.options[0]?.value;
        tableSelect.disabled = mode === "edit";
        renderDynamicFields(tableSelect.value, values);

        modal.classList.remove("hidden");
      }

      function closeModal() {
        document.getElementById("recordModal").classList.add("hidden");
        activeEditContext = null;
      }

      function renderDynamicFields(tableName, values = {}) {
        const fieldsDiv = document.getElementById("dynamicFields");
        fieldsDiv.innerHTML = "";
        const fields = (tableDefinitions[tableName] && tableDefinitions[tableName].fields) || TABLE_FIELD_MAP[tableName] || [];

        fields.forEach(field => {
          const wrapper = document.createElement("div");
          wrapper.className = "modal-field";
          if (field === "address" && tableName === "BCSO Active Warrants") {
            wrapper.classList.add("full-width", "address-inline-row");
          } else if (["address", "notes"].includes(field)) {
            wrapper.classList.add("full-width");
          }

          const label = document.createElement("label");
          const isRequired = (REQUIRED_FIELDS_BY_TABLE[tableName] || []).includes(field);
          label.textContent = `${FIELD_LABELS[field] || field}${isRequired ? " *" : ""}`;

          if (field === "address" && tableName === "BCSO Active Warrants") {
            const row = document.createElement("div");
            row.className = "address-fields-inline";

            const addressCol = document.createElement("div");
            addressCol.className = "address-main-col";
            const input = document.createElement("input");
            input.classList.add("modal-control");
            input.dataset.field = field;
            input.type = "text";
            input.required = isRequired;
            input.value = values[field] ?? "";
            addressCol.appendChild(label);
            addressCol.appendChild(input);

            const aptCol = document.createElement("div");
            aptCol.className = "address-apt-col";
            const aptLabel = document.createElement("label");
            aptLabel.textContent = BCSO_VIRTUAL_FIELDS.apt_unit;
            const aptInput = document.createElement("input");
            aptInput.classList.add("modal-control");
            aptInput.dataset.field = "apt_unit";
            aptInput.type = "text";
            aptInput.value = "";
            aptCol.appendChild(aptLabel);
            aptCol.appendChild(aptInput);

            row.appendChild(addressCol);
            row.appendChild(aptCol);
            wrapper.appendChild(row);
          } else {
            const bcsoOptions = tableName === "BCSO Active Warrants" ? BCSO_DROPDOWN_OPTIONS[field] : null;
            const input = field === "notes"
              ? document.createElement("textarea")
              : (bcsoOptions ? document.createElement("select") : document.createElement("input"));
            input.classList.add("modal-control");
            input.dataset.field = field;
            input.required = isRequired;

            if (bcsoOptions) {
              const emptyOption = document.createElement("option");
              emptyOption.value = "";
              emptyOption.textContent = `Select ${FIELD_LABELS[field] || field}`;
              input.appendChild(emptyOption);

              bcsoOptions.forEach(optionValue => {
                const option = document.createElement("option");
                option.value = optionValue;
                option.textContent = optionValue;
                input.appendChild(option);
              });

              input.value = values[field] ?? "";
            } else {
              if (field !== "notes") {
                input.type = ["date_of_birth", "issue_date", "intake_date"].includes(field) ? "date" : "text";
              }
              input.value = values[field] ?? "";
            }

            wrapper.appendChild(label);
            wrapper.appendChild(input);
          }

          fieldsDiv.appendChild(wrapper);
        });
      }

      async function loadTableDefinitions() {
        const response = await fetch(`${window.location.origin}/table_definitions`);
        tableDefinitions = await response.json();
        const tableSelect = document.getElementById("tableSelect");
        tableSelect.innerHTML = "";
        Object.keys(tableDefinitions)
          .filter(tableName => ADD_ALLOWED_TABLES.has(tableName))
          .forEach(tableName => {
          const opt = document.createElement("option");
          opt.value = tableName;
          opt.textContent = tableName;
          tableSelect.appendChild(opt);
          });
      }

      function mapRowToFields(dept, row) {
        const tableName = DEPT_TO_TABLE[dept.toLowerCase()] || "Field Services Department";
        const fields = (tableDefinitions[tableName] && tableDefinitions[tableName].fields) || TABLE_FIELD_MAP[tableName] || [];
        const out = {};

        fields.forEach(field => {
          if (field === "full_name") out[field] = row.name || "";
          else if (field === "issue_date") out[field] = row.record_date || "";
          else out[field] = row[field] || "";
        });
        return {tableName, out};
      }

      async function saveLandlordTenantInlineEdit(row, tr, actionsTd, editBtn, deleteBtn) {
        const addressInput = tr.querySelector('input[data-inline-field="address"]');
        const aptInput = tr.querySelector('input[data-inline-field="apt"]');
        const addressValue = addressInput ? addressInput.value.trim() : "";
        const aptValue = aptInput ? aptInput.value.trim() : "";

        const response = await fetch(`${window.location.origin}/records/${row.record_id}`, {
          method: "PATCH",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({fields: {address: addressValue, apt: aptValue}})
        });

        if (!response.ok) {
          let errText = "Unable to save record.";
          try {
            const err = await response.json();
            errText = err.error || errText;
          } catch (_) {}
          alert(errText);
          return;
        }

        row.address = addressValue;
        row.apt = aptValue;
        actionsTd.dataset.editing = "";
        await search({preventDefault: () => {}});
      }

      async function saveRecord() {
        if (!CAN_EDIT) {
          const status = document.getElementById("modalStatus");
          status.textContent = "You do not have permission to edit records.";
          return;
        }

        const status = document.getElementById("modalStatus");
        const tableName = document.getElementById("tableSelect").value;
        if (!ADD_ALLOWED_TABLES.has(tableName)) {
          status.textContent = "Adding records is only available for Warrants to Audit and BCSO Active Warrants.";
          return;
        }

        const inputs = Array.from(document.querySelectorAll("#dynamicFields input, #dynamicFields select, #dynamicFields textarea"));
        const fields = {};
        inputs.forEach(input => fields[input.dataset.field] = input.value);

        if (tableName === "BCSO Active Warrants" && "apt_unit" in fields) {
          const apt = String(fields.apt_unit || "").trim();
          const address = String(fields.address || "").trim();
          fields.address = apt ? `${address}${address ? ", " : ""}Unit: ${apt}` : address;
          delete fields.apt_unit;
        }

        const requiredFields = REQUIRED_FIELDS_BY_TABLE[tableName] || [];
        const missingFields = requiredFields.filter(field => !String(fields[field] || "").trim());
        if (missingFields.length > 0) {
          const labels = missingFields.map(field => FIELD_LABELS[field] || field);
          status.textContent = `Missing required fields: ${labels.join(", ")}`;
          return;
        }

        const isEdit = activeEditContext && activeEditContext.mode === "edit";
        const url = isEdit
          ? `${window.location.origin}/records/${activeEditContext.recordId}`
          : `${window.location.origin}/records`;
        const method = isEdit ? "PATCH" : "POST";
        const payload = isEdit ? {fields} : {table: tableName, fields};

        const response = await fetch(url, {
          method,
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const err = await response.json();
          status.textContent = err.error || "Unable to save.";
          return;
        }

        status.textContent = "Saved successfully.";
        closeModal();

        await search({ preventDefault: () => {} });
      }


      function getCurrentSearchFilters() {
        return {
          name: document.getElementById("name").value,
          case_number: document.getElementById("case_number").value,
          intake_date: document.getElementById("intake_date_hidden").value,
          last_x_days: document.getElementById("last_x_days").value,
          sex: document.getElementById("sex").value,
          race: document.getElementById("race").value,
          issuing_county: document.getElementById("issuing_county").value,
          sid: document.getElementById("sid").value,
          dob: document.getElementById("dob").value
        };
      }

      async function startCsvExport(statusEl, linkEl) {
        if (!lastSearchFilters) {
          statusEl.textContent = "Run a search first.";
          return;
        }

        statusEl.textContent = "Starting export...";
        linkEl.style.display = "none";
        linkEl.removeAttribute("href");

        const response = await fetch(`${window.location.origin}/export-csv`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(lastSearchFilters)
        });

        if (!response.ok) {
          statusEl.textContent = "Failed to start export.";
          return;
        }

        const data = await response.json();
        const token = data.token;
        statusEl.textContent = "Export started. Building CSV...";

        if (exportPollTimer) {
          clearInterval(exportPollTimer);
        }

        exportPollTimer = setInterval(async () => {
          const pollResponse = await fetch(`${window.location.origin}/export-status?token=${encodeURIComponent(token)}`);
          if (!pollResponse.ok) {
            return;
          }

          const pollData = await pollResponse.json();
          if (pollData.status === "ready") {
            clearInterval(exportPollTimer);
            exportPollTimer = null;
            statusEl.textContent = "CSV ready.";
            linkEl.href = pollData.url;
            linkEl.style.display = "inline";
            linkEl.textContent = "Download CSV";
          } else if (pollData.status === "failed") {
            clearInterval(exportPollTimer);
            exportPollTimer = null;
            statusEl.textContent = pollData.error || "Export failed.";
          } else {
            statusEl.textContent = "Export processing...";
          }
        }, 2000);
      }

      async function search(event) {
        if (event && typeof event.preventDefault === "function") {
          event.preventDefault();
        }

        const status = document.getElementById("statusMessage");
        const resultsDiv = document.getElementById("results");
        resultsDiv.innerHTML = "";
        status.textContent = "Searching...";
        status.classList.add("loading");

        const filterPayload = getCurrentSearchFilters();
        lastSearchFilters = {...filterPayload};
        const params = new URLSearchParams(filterPayload);

        try {
          const response = await fetch(`${window.location.origin}/search_all?${params}`);
          const data = await response.json();
          status.classList.remove("loading");

          if (Object.keys(data).length === 0) {
            resultsDiv.innerHTML = "<p>No results found.</p>";
            status.textContent = "No results found.";
            return;
          }

          status.textContent = "Search complete.";

          const orderedEntries = Object.entries(data).sort(([deptA], [deptB]) => {
            const aIsDvPdf = deptA.toLowerCase() === "dv pdf";
            const bIsDvPdf = deptB.toLowerCase() === "dv pdf";
            if (aIsDvPdf && !bIsDvPdf) return -1;
            if (!aIsDvPdf && bIsDvPdf) return 1;
            const aIsBcso = deptA.toLowerCase() === "bcso active warrants";
            const bIsBcso = deptB.toLowerCase() === "bcso active warrants";
            if (aIsBcso && !bIsBcso) return -1;
            if (!aIsBcso && bIsBcso) return 1;
            return deptA.localeCompare(deptB);
          });

          for (const [dept, info] of orderedEntries) {
            const rows = info.records;
            const count = info.count;
            const div = document.createElement("div");
            div.className = "department";

            const title = document.createElement("h2");
            const DISPLAY_NAMES = {
              "warrant of restitution - mdec": "Warrant of Restitution - Status",
              "doc jail population": "DoC Jail Population",
              "baltimore jail population": "Baltimore Jail Population",
              "field services department": "Landlord Tenant",
              "active warrants": "Warrants to Audit",
            };
            title.textContent = DISPLAY_NAMES[dept.toLowerCase()] || dept;
            div.appendChild(title);

            if (dept.toLowerCase() === "field services department") {
              const exportWrap = document.createElement("div");
              exportWrap.className = "lt-export-controls";
              const exportBtn = document.createElement("button");
              exportBtn.type = "button";
              exportBtn.textContent = "Download CSV";
              const exportStatus = document.createElement("span");
              exportStatus.className = "lt-export-status";
              const exportLink = document.createElement("a");
              exportLink.style.display = "none";
              exportLink.target = "_blank";
              exportLink.rel = "noopener noreferrer";

              exportBtn.addEventListener("click", () => startCsvExport(exportStatus, exportLink));
              exportWrap.appendChild(exportBtn);
              exportWrap.appendChild(exportStatus);
              exportWrap.appendChild(exportLink);
              div.appendChild(exportWrap);
            }

            const content = document.createElement("div");
            content.className = "department-content";
            const countText = document.createElement("div");
            countText.className = "count";
            countText.textContent = `Results: ${count} record${count !== 1 ? "s" : ""}`;
            content.appendChild(countText);

            title.style.cursor = "pointer";
            title.textContent = `▼ ${title.textContent}`;
            title.addEventListener("click", () => {
              const collapsed = content.classList.toggle("collapsed");
              title.textContent = `${collapsed ? "▶" : "▼"} ${title.textContent.slice(2)}`;
            });

            const table = document.createElement("table");
            let headers = [];
            if (dept.toLowerCase() === "bcso active warrants") {
              headers = ["Issuing County","Case Number","Warrant ID Number","Warrant Type","Issue Date","Warrant Status","Name","SID","Date of Birth","Race","Sex","LKA","Notes"];
            } else if (dept.toLowerCase() === "active warrants") {
              headers = ["Name","Case Number","Issue Date","Date of Birth","Sex","Race","Issuing County","1st Charge"];
            } else if (dept.toLowerCase() === "baltimore jail population" || dept.toLowerCase() === "doc jail population") {
              headers = ["SID","Name","Date of Birth","Facility"];
            } else if (dept.toLowerCase() === "field services department") {
              headers = ["Name","Case Number","Address","City/State","APT/Unit","Event Type","Event Date","Case Type"];
            } else if (dept.toLowerCase() === "dv pdf") {
              headers = ["Case Number","Respondent Name","Issue Date","Type","PDF Download"];
            } else {
              headers = ["Name","Case Number","Address","APT/Unit","Court Document Type","Event Date","Current Disposition"];            }
            headers.push("Actions");

            const thead = document.createElement("thead");
            const headerRow = document.createElement("tr");
            headers.forEach((h, headerIndex) => {
              const th = document.createElement("th");
              th.textContent = h;
              if (/date/i.test(h)) {
                wireDateHeaderSort(table, th, headerIndex);
              }
              headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement("tbody");
            rows.forEach(row => {
              const tr = document.createElement("tr");
              const dataHeaders = headers.slice(0, -1);
              const cells = dataHeaders.map(h => {
                if (h === "PDF Download") return row.pdf_download || "";
                if (dept.toLowerCase() === "dv pdf") {
                  if (h === "Respondent Name") return row.respondent_name || "";
                  if (h === "Issue Date") return row.issue_date || "";
                  if (h === "Type") return row.type || "";
                }
                if (h === "Address") {
                  if (dataHeaders.includes("City/State")) return row.address || "";
                  return [row.address, row.city, row.state].filter(Boolean).join(", ");
                }
                if (h === "City/State") return [row.city, row.state].filter(Boolean).join(", ");
                const key = FIELD_MAP[h] || h;
                return row[key] ?? "";
              });

              cells.forEach((val, index) => {
                const td = document.createElement("td");
                const headerLabel = dataHeaders[index];
                if (headerLabel === "PDF Download" && val) {
                  const link = document.createElement("a");
                  link.href = val;
                  link.target = "_blank";
                  link.rel = "noopener noreferrer";
                  link.textContent = "Download PDF";
                  td.appendChild(link);
                } else {
                  td.textContent = val;
                }
                tr.appendChild(td);
              });

              const actionsTd = document.createElement("td");
              actionsTd.className = "table-actions-cell";
              const deptKey = (dept || "").toLowerCase();
              const isActionableDept = ACTIONABLE_DEPARTMENTS.has(deptKey);
              const isLandlordTenantDept = LANDLORD_TENANT_DEPARTMENTS.has(deptKey);
              const isDvPdf = deptKey === "dv pdf";

              if (isDvPdf) {
                actionsTd.textContent = "—";
              } else if (isActionableDept) {
                const editBtn = document.createElement("button");
                editBtn.type = "button";
                editBtn.textContent = "Edit";
                editBtn.className = "table-action-btn";
                editBtn.addEventListener("click", async () => {
                  if (!CAN_EDIT) {
                    alert("You do not have permission to edit records.");
                    return;
                  }

                  if (!isLandlordTenantDept) {
                    const {tableName, out} = mapRowToFields(dept, row);
                    openModal({mode: "edit", tableName, values: out, recordId: row.record_id});
                    return;
                  }

                  const isEditing = actionsTd.dataset.editing === "true";
                  const addressIndex = dataHeaders.indexOf("Address");
                  const aptIndex = dataHeaders.indexOf("APT/Unit");
                  if (addressIndex === -1 || aptIndex === -1) {
                    return;
                  }

                  if (!isEditing) {
                    const addressTd = tr.children[addressIndex];
                    const aptTd = tr.children[aptIndex];
                    const addressInput = document.createElement("input");
                    addressInput.type = "text";
                    addressInput.value = row.address || "";
                    addressInput.dataset.inlineField = "address";
                    const aptInput = document.createElement("input");
                    aptInput.type = "text";
                    aptInput.value = row.apt || "";
                    aptInput.dataset.inlineField = "apt";
                    addressTd.innerHTML = "";
                    aptTd.innerHTML = "";
                    addressTd.appendChild(addressInput);
                    aptTd.appendChild(aptInput);
                    actionsTd.dataset.editing = "true";
                    editBtn.textContent = "Save";
                    if (deleteBtn) {
                      deleteBtn.textContent = "Cancel";
                      deleteBtn.style.display = "inline-block";
                    }
                    return;
                  }

                  await saveLandlordTenantInlineEdit(row, tr, actionsTd, editBtn, deleteBtn);
                });
                actionsTd.appendChild(editBtn);

                let deleteBtn = null;
                if (!isLandlordTenantDept) {
                  deleteBtn = document.createElement("button");
                  deleteBtn.type = "button";
                  deleteBtn.textContent = "Delete";
                  deleteBtn.className = "table-action-btn danger-btn";
                  deleteBtn.addEventListener("click", async () => {
                    if (!CAN_DELETE) {
                      alert("You do not have permission to delete records.");
                      return;
                    }

                    const confirmed = window.confirm("Are you sure you want to delete this record?");
                    if (!confirmed) {
                      return;
                    }

                    const response = await fetch(`${window.location.origin}/records/${row.record_id}`, {
                      method: "DELETE"
                    });

                    if (!response.ok) {
                      let errText = "Unable to delete record.";
                      try {
                        const err = await response.json();
                        errText = err.error || errText;
                      } catch (_) {}
                      alert(errText);
                      return;
                    }

                    tr.remove();
                  });
                  actionsTd.appendChild(deleteBtn);
                } else {
                  deleteBtn = document.createElement("button");
                  deleteBtn.type = "button";
                  deleteBtn.textContent = "Cancel";
                  deleteBtn.className = "table-action-btn danger-btn";
                  deleteBtn.style.display = "none";
                  deleteBtn.addEventListener("click", () => {
                    const addressIndex = dataHeaders.indexOf("Address");
                    const aptIndex = dataHeaders.indexOf("APT/Unit");
                    tr.children[addressIndex].textContent = [row.address, row.city, row.state].filter(Boolean).join(", ");
                    tr.children[aptIndex].textContent = row.apt || "";
                    actionsTd.dataset.editing = "";
                    editBtn.textContent = "Edit";
                    deleteBtn.style.display = "none";
                  });
                  actionsTd.appendChild(deleteBtn);
                }
              } else {
                actionsTd.textContent = "—";
              }

              tr.appendChild(actionsTd);

              tbody.appendChild(tr);
            });

            table.appendChild(tbody);
            const wrapper = document.createElement("div");
            wrapper.className = "results-table-wrapper";
            wrapper.appendChild(table);
            content.appendChild(wrapper);
            div.appendChild(content);
            resultsDiv.appendChild(div);
          }
        } catch (err) {
          console.error(err);
          status.classList.remove("loading");
          status.textContent = "Error occurred during search.";
        }
      }

      async function uploadDvPdf(file) {
        const status = document.getElementById("statusMessage");
        const formData = new FormData();
        formData.append("pdf_file", file);
        status.textContent = "Uploading DV PDF...";
        status.classList.add("loading");
        try {
          const response = await fetch(`${window.location.origin}/dv-pdf/upload`, {
            method: "POST",
            body: formData
          });
          const data = await response.json();
          if (!response.ok) {
            status.textContent = data.error || "DV PDF upload failed.";
            status.classList.remove("loading");
            return;
          }
          status.textContent = "DV PDF uploaded and parsed successfully.";
          status.classList.remove("loading");
          search();
        } catch (err) {
          console.error(err);
          status.classList.remove("loading");
          status.textContent = "Error uploading DV PDF.";
        }
      }

      document.getElementById("addRecordBtn").addEventListener("click", () => {
        window.open("https://arcg.is/1O1zjf1", "_blank", "noopener,noreferrer");
      });
      document.getElementById("uploadDvPdfBtn").addEventListener("click", () => {
        document.getElementById("dvPdfFile").click();
      });
      document.getElementById("dvPdfFile").addEventListener("change", (event) => {
        const [file] = event.target.files || [];
        if (!file) {
          return;
        }
        uploadDvPdf(file);
        event.target.value = "";
      });
      document.getElementById("tableSelect").addEventListener("change", (e) => renderDynamicFields(e.target.value));
      document.getElementById("cancelRecordBtn").addEventListener("click", closeModal);
      document.getElementById("saveRecordBtn").addEventListener("click", saveRecord);
      document.querySelector("#recordModal .modal-content").addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          saveRecord();
        }
      });

      window.addEventListener("DOMContentLoaded", async () => {
        await loadTableDefinitions();
        await search();
      });
    </script>

  
  
  </div> 
</body>
</html>
