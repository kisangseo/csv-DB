name: run-ingest

on:
  schedule:
    - cron: "0 * * * *" # every hour
  workflow_dispatch:

concurrency:
  group: run-ingest-main
  cancel-in-progress: false

jobs:
  run-ingest:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      ENDPOINT_URL: https://bcso-cvdb-dwbnfmcjggf2f2a0.centralus-01.azurewebsites.net/run-ingest
      STATUS_URL: https://bcso-cvdb-dwbnfmcjggf2f2a0.centralus-01.azurewebsites.net/run-ingest/status

    steps:
      - name: Trigger ingest pipeline endpoint
        run: |
          echo "Calling: $ENDPOINT_URL"
          raw_response="$(curl --show-error --silent --location --write-out $'\nHTTP_STATUS:%{http_code}' "$ENDPOINT_URL" || true)"
          http_status="$(printf '%s' "$raw_response" | sed -n 's/^HTTP_STATUS://p' | tail -n 1)"
          response="$(printf '%s' "$raw_response" | sed '$d')"
          echo "HTTP status: ${http_status:-unknown}"
          echo "Raw endpoint response:"
          echo "$response"
          RESPONSE="$response" HTTP_STATUS="$http_status" python - <<'PY'
          import json
          import os
          import sys

          raw = os.environ.get("RESPONSE", "")
          http_status = os.environ.get("HTTP_STATUS", "")
          normalized = raw.strip().lower()
          if normalized in {"ok", "started"}:
            print(f"Endpoint returned plain '{normalized}' (accepted).")
            sys.exit(0)

          try:
            data = json.loads(raw)
          except Exception:
            print("Endpoint did not return valid JSON.")
            if http_status and http_status.startswith(("4", "5")):
              print(f"HTTP status was {http_status}. Failing.")
            sys.exit(1)

          state = (data.get("status") or "").lower()
          if state not in {"ok", "started", "running"}:
            print("Endpoint returned non-ok status:", data)
            sys.exit(1)

          if http_status and http_status.startswith(("4", "5")):
            print(f"Endpoint status payload is ok but HTTP status was {http_status}.")
            sys.exit(1)
          PY

      - name: Poll ingest status (up to 5 minutes)
        run: |
          echo "Polling: $STATUS_URL"
          for i in {1..10}; do
            status_response="$(curl --show-error --silent --location "$STATUS_URL")"
            echo "Poll $i: $status_response"

            STATUS_RESPONSE="$status_response" python - <<'PY'
            import json
            import os
            import sys

            raw = os.environ.get("STATUS_RESPONSE", "")
            try:
              data = json.loads(raw)
            except Exception:
              print("Status endpoint did not return JSON.")
              sys.exit(2)

            state = (data.get("status") or "").lower()
            if state == "completed":
              print("Ingest pipeline completed.")
              sys.exit(0)
            if state == "failed":
              print("Ingest pipeline failed:", data)
              sys.exit(1)
            if state in {"running", "started", "idle"}:
              print(f"Ingest pipeline state: {state}")
              sys.exit(3)

            print("Unexpected status payload:", data)
            sys.exit(1)
            PY
            rc=$?
            if [ "$rc" -eq 0 ]; then
              exit 0
            fi
            if [ "$rc" -eq 1 ] || [ "$rc" -eq 2 ]; then
              exit 1
            fi
            sleep 30
          done

          echo "Timed out waiting for ingest to reach completed state (5 minutes)."
          exit 1
